<!-- Updated editor.component.html -->
<div class="editor-container">
  <div #editorContainer class="monaco-editor"></div>

  <div *ngIf="error" class="error-container">
    <mat-icon class="error-icon" color="warn">error_outline</mat-icon>
    <div class="error-details">
      <h4>Syntax Error</h4>
      <pre>{{ error }}</pre>
    </div>
    <button mat-raised-button color="accent" (click)="tryFixWithAI()">
      <mat-icon>auto_fix_high</mat-icon>
      AI Fix
    </button>
  </div>
</div>
